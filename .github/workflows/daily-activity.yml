name: Daily Activity

on:
  schedule:
    - cron: "0 */6 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit daily activity
        run: |
          git config --global user.name "Mahmoud Mohamed"
          git config --global user.email "mahmoudfalous@gmail.com"

          # Sync latest changes first
          git pull --rebase origin main

          # Append new activity
          echo "Last activity: $(date)" >> activity.log

          git add activity.log

          # Create commit
          git commit -m "daily_activity_$(date +'%Y-%m-%d_%H-%M-%S')" || exit 0

          # Push to main
          git push origin main
