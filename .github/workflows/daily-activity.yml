name: Daily Activity

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create change branch and commit
        id: prep
        run: |
          git config --global user.name "Mahmoud Mohamed"
          git config --global user.email "mahmoudfalous@gmail.com"

          BRANCH="daily-activity-$(date +'%Y-%m-%d_%H-%M-%S')"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"
          echo "Last activity: $(date -u)" >> activity.log
          git add activity.log
          git commit -m "daily_activity_$(date +'%Y-%m-%d_%H-%M-%S')" || exit 0
          git push origin "$BRANCH"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.prep.outputs.branch }}
          base: main
          title: "daily_activity_${{ github.run_id }}"
          body: "Automated daily activity update."
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --squash --auto --delete-branch
