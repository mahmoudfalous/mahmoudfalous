name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: mahmoudfalous
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Create timestamp
        run: |
          sudo chmod -R 777 dist || true
          mkdir -p dist
          echo "Last snake run: $(date)" > dist/last_snakerun.txt

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: last_snakerun_$(date +'%Y-%m-%d_%H-%M-%S')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create change branch and commit activity
        id: prep
        run: |
          git config --global user.name "Mahmoud Mohamed"
          git config --global user.email "mahmoudfalous@gmail.com"

          BRANCH="snake-activity-$(date +'%Y-%m-%d_%H-%M-%S')"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git checkout -b "$BRANCH"
          echo "Snake run at $(date -u)" >> activity.log
          git add activity.log
          git commit -m "last_snakerun_$(date +'%Y-%m-%d_%H-%M-%S')" || exit 0
          git push origin "$BRANCH"

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.prep.outputs.branch }}
          base: main
          title: "last_snakerun_${{ github.run_id }}"
          body: "Automated snake activity update."
          delete-branch: true

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --squash --auto --delete-branch
