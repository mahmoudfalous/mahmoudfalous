name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: mahmoudfalous
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Create timestamp file
        run: |
          sudo chmod -R 777 dist || true
          mkdir -p dist
          echo "Last snake run: $(date)" > dist/last_snakerun.txt

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: last_snakerun_$(date +'%Y-%m-%d_%H-%M-%S')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
